services:
  backend:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /app
    command: sh -c "dotnet restore ./backend/iracing-overlay-studio.csproj && dotnet run --project ./backend/iracing-overlay-studio.csproj --urls http://0.0.0.0:5000"
    volumes:
      - ./:/app
    ports:
      - "5000:5000"

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend
